name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y shellcheck
          shellcheck bin/tiss lib/*.sh scripts/*.sh scripts/tiss/*.sh tests/*.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install miller
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -q && sudo apt-get install -y miller
          else
            brew install miller
          fi
      - name: run test suite
        run: tests/run.sh
