name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: conventional commits check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="origin/${{ github.base_ref }}..HEAD"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] &&
            git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            range="${{ github.event.before }}..${{ github.sha }}"
          else
            range="-1 ${{ github.sha }}"
          fi
          bad=0
          while IFS= read -r subj; do
            case "$subj" in
              Merge* | Revert*) continue ;;
            esac
            if ! printf '%s' "$subj" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: '; then
              echo "not a conventional commit: $subj"
              bad=1
            fi
          done < <(git log --format=%s $range)
          exit $bad

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y shellcheck
          # every .sh at any depth (polyglot leaves lint their own way),
          # plus the two bare-name entry points
          find lib scripts tests -name '*.sh' -print0 \
            | xargs -0 shellcheck bin/tiss install.sh

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install miller
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -q && sudo apt-get install -y miller
          else
            brew install miller
          fi
      - name: run test suite
        run: tests/run.sh
